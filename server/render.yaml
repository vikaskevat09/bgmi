# Render Blueprint for the TopUpWorld backend.
# In Render: New → Blueprint → connect your repo (root = this "server" folder),
# OR create a Web Service manually and use the settings below.
services:
  - type: web
    name: topupworld-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/config
    envVars:
      - key: CASHFREE_ENV
        value: production
      - key: CASHFREE_APP_ID
        sync: false
      - key: CASHFREE_SECRET_KEY
        sync: false
      - key: CASHFREE_API_VERSION
        value: 2023-08-01
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: COOKIE_CROSS_SITE
        value: "true"
      - key: CORS_ORIGIN
        sync: false
      - key: RETURN_URL
        sync: false
      - key: NOTIFY_URL
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
      - key: RAPIDAPI_HOST
        sync: false
      - key: RAPIDAPI_URL_TEMPLATE
        sync: false
